{% extends 'base.html' %}
{% block title %}Liquidación {{ liquidacion.numero }}{% endblock %}

{% block content %}
<style>
    .badge-estado-pendiente_pago { background-color: #ffc107; color: #000; }
    .badge-estado-pagada { background-color: #28a745; color: #fff; }
    .badge-estado-anulada { background-color: #dc3545; color: #fff; }
    .total-resumen {
        font-size: 1.3rem;
        padding: 12px;
        border-radius: 8px;
    }
</style>

<div class="container-fluid mt-3" id="contenedorDetalle">
    <div class="text-center text-muted py-5">
        <div class="spinner-border" role="status"></div>
        <p class="mt-3">Cargando detalle...</p>
    </div>
</div>

<script>
const LIQ_ID = {{ liquidacion.id }};

const fmt = (n) => '$' + Number(n||0).toLocaleString('es-AR', {minimumFractionDigits:2, maximumFractionDigits:2});

document.addEventListener('DOMContentLoaded', cargarDetalle);

function cargarDetalle() {
    fetch(`/api/liquidacion/${LIQ_ID}`)
        .then(r => r.json())
        .then(data => {
            if (!data.success) {
                document.getElementById('contenedorDetalle').innerHTML = 
                    `<div class="alert alert-danger">${data.error}</div>`;
                return;
            }
            renderizarDetalle(data.liquidacion, data.detalles);
        });
}

function renderizarDetalle(liq, detalles) {
    const cont = document.getElementById('contenedorDetalle');
    
    const estadoBadge = `<span class="badge badge-estado-${liq.estado}">${
        liq.estado === 'pendiente_pago' ? 'Pendiente de pago' :
        liq.estado === 'pagada' ? 'Pagada' : 'Anulada'
    }</span>`;
    
    const baseLabel = liq.base_calculo === 'con_iva' ? 'Con IVA' : 'Sin IVA';
    
    // Botones de acción
    let botones = `
        <button class="btn btn-secondary" onclick="window.print()">
            <i class="fas fa-print"></i> Imprimir A4
        </button>
        <button class="btn btn-info" onclick="imprimirTermica()">
            <i class="fas fa-receipt"></i> Imprimir Ticket
        </button>
    `;
    
    if (liq.estado === 'pendiente_pago') {
        botones += `
            <button class="btn btn-success" onclick="marcarPagada()">
                <i class="fas fa-check"></i> Marcar como Pagada
            </button>
        `;
    }
    
    if (liq.estado !== 'anulada') {
        botones += `
            <button class="btn btn-danger" onclick="anularLiquidacion()">
                <i class="fas fa-ban"></i> Anular
            </button>
        `;
    }
    
    botones += `
        <a href="/liquidaciones" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left"></i> Volver
        </a>
    `;
    
    let html = `
        <div class="d-flex justify-content-between align-items-start mb-3">
            <div>
                <h2 class="mb-1">
                    <i class="fas fa-handshake" style="color:#6f42c1;"></i> Liquidación ${liq.numero}
                </h2>
                <small class="text-muted">${liq.fecha} · Generada por ${liq.usuario_nombre}</small>
            </div>
            <div class="d-flex gap-2 flex-wrap">${botones}</div>
        </div>

        <div class="row">
            <div class="col-md-8">
                <!-- Datos generales -->
                <div class="card shadow-sm mb-3">
                    <div class="card-header bg-light"><h5 class="mb-0"><i class="fas fa-info-circle"></i> Datos generales</h5></div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <p><strong>Intermediario:</strong> ${liq.intermediario_nombre}</p>
                                <p><strong>Documento:</strong> ${liq.intermediario_documento || '-'}</p>
                            </div>
                            <div class="col-md-6">
                                <p><strong>Estado:</strong> ${estadoBadge}</p>
                                <p><strong>Base de cálculo:</strong> ${baseLabel}</p>
                                ${liq.medio_pago ? `<p><strong>Medio de pago:</strong> ${liq.medio_pago}</p>` : ''}
                                ${liq.fecha_pago ? `<p><strong>Fecha de pago:</strong> ${liq.fecha_pago}</p>` : ''}
                            </div>
                        </div>
                        ${liq.motivo ? `
                            <hr>
                            <p class="mb-0"><strong>Observaciones:</strong></p>
                            <p class="text-muted" style="white-space:pre-wrap;">${liq.motivo}</p>
                        ` : ''}
                    </div>
                </div>

                <!-- Tabla de detalle -->
                <div class="card shadow-sm">
                    <div class="card-header bg-light"><h5 class="mb-0"><i class="fas fa-list"></i> Comprobantes liquidados</h5></div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Interno</th>
                                        <th>Factura</th>
                                        <th class="text-end">Costo</th>
                                        <th class="text-end">Vendido</th>
                                        <th class="text-end">Diferencia</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${detalles.map(d => `
                                        <tr>
                                            <td>
                                                <a href="/factura/${d.interno_id}" target="_blank">${d.interno_numero}</a><br>
                                                <small class="text-muted">${d.interno_fecha}</small>
                                            </td>
                                            <td>
                                                ${d.factura_numero ? `<a href="/factura/${d.factura_id}" target="_blank">${d.factura_numero}</a>` : '-'}<br>
                                                <small class="text-muted">${d.factura_fecha || ''}</small>
                                            </td>
                                            <td class="text-end">${fmt(d.monto_interno)}</td>
                                            <td class="text-end">${fmt(d.monto_factura)}</td>
                                            <td class="text-end fw-bold" style="color:#6f42c1;">${fmt(d.monto_diferencia)}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                                <tfoot class="table-light fw-bold">
                                    <tr>
                                        <td colspan="2" class="text-end">TOTALES:</td>
                                        <td class="text-end">${fmt(liq.total_costo)}</td>
                                        <td class="text-end">${fmt(liq.total_vendido)}</td>
                                        <td class="text-end" style="color:#6f42c1;">${fmt(liq.total_liquidar)}</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sidebar de totales -->
            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-header" style="background-color:#6f42c1; color:white;">
                        <h5 class="mb-0"><i class="fas fa-calculator"></i> Resumen</h5>
                    </div>
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-2">
                            <span>Total vendido:</span>
                            <strong>${fmt(liq.total_vendido)}</strong>
                        </div>
                        <div class="d-flex justify-content-between mb-2">
                            <span>Total costo (entregado):</span>
                            <strong>${fmt(liq.total_costo)}</strong>
                        </div>
                        <hr>
                        <div class="total-resumen text-center" style="background-color:#f3eeff; color:#6f42c1;">
                            <small class="d-block">Total liquidado al intermediario</small>
                            <strong style="font-size:1.6rem;">${fmt(liq.total_liquidar)}</strong>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    cont.innerHTML = html;
}

function marcarPagada() {
    Swal.fire({
        title: '¿Marcar como pagada?',
        html: `
            <p>Esto cierra la liquidación y registra el cobro.</p>
            <label class="form-label">Medio de pago:</label>
            <select id="medioPagoMarcar" class="form-select">
                <option value="EFECTIVO">Efectivo</option>
                <option value="TRANSFERENCIA">Transferencia</option>
                <option value="CHEQUE">Cheque</option>
            </select>
        `,
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: 'Sí, marcar pagada',
        cancelButtonText: 'Cancelar',
        confirmButtonColor: '#28a745',
        preConfirm: () => document.getElementById('medioPagoMarcar').value
    }).then((res) => {
        if (!res.isConfirmed) return;
        
        fetch(`/api/liquidacion/${LIQ_ID}/pagar`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({medio_pago: res.value})
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                Swal.fire({icon:'success', title:'Pagada', text:data.message, timer:2000})
                    .then(() => location.reload());
            } else {
                Swal.fire({icon:'error', title:'Error', text:data.error});
            }
        });
    });
}

function anularLiquidacion() {
    Swal.fire({
        title: '¿Anular liquidación?',
        html: `
            <p>Los internos volverán al pool de pendientes para volver a liquidarse.</p>
            <label class="form-label">Motivo (opcional):</label>
            <input type="text" id="motivoAnular" class="form-control" placeholder="Ej: error de cálculo...">
        `,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: '<i class="fas fa-ban"></i> Sí, anular',
        cancelButtonText: 'Cancelar',
        confirmButtonColor: '#dc3545',
        preConfirm: () => document.getElementById('motivoAnular').value.trim()
    }).then((res) => {
        if (!res.isConfirmed) return;
        
        fetch(`/api/liquidacion/${LIQ_ID}/anular`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({motivo: res.value || ''})
        })
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                Swal.fire({icon:'success', title:'Anulada', text:data.message, timer:2500})
                    .then(() => location.reload());
            } else {
                Swal.fire({icon:'error', title:'Error', text:data.error});
            }
        });
    });
}

function imprimirTermica() {
    Swal.fire({
        title: 'Imprimiendo...',
        text: 'Enviando a impresora térmica',
        allowOutsideClick: false,
        didOpen: () => Swal.showLoading()
    });
    
    fetch(`/api/liquidacion/${LIQ_ID}/imprimir_termica`, {method: 'POST'})
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                Swal.fire({icon:'success', title:'Impreso', text:'Ticket enviado a la impresora', timer:2000});
            } else {
                Swal.fire({icon:'error', title:'Error de impresión', text:data.error || 'No se pudo imprimir'});
            }
        })
        .catch(err => Swal.fire({icon:'error', title:'Error', text:err.message}));
}
</script>
{% endblock %}
