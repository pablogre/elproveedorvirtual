{% extends 'base.html' %}
{% block title %}Detalle de Remito{% endblock %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<div class="d-flex justify-content-between align-items-center mt-3 mb-3 d-print-none">
    <h2><i class="fas fa-truck-loading me-2"></i>Detalle de Remito</h2>
    <div>
        <a href="{{ url_for('remitos.listado') }}" class="btn btn-outline-secondary me-2">
            <i class="fas fa-arrow-left me-1"></i> Volver
        </a>
        <button class="btn btn-success me-2" onclick="imprimirTermica()">
            <i class="fas fa-print me-1"></i> Imprimir térmica
        </button>
        <button class="btn btn-outline-primary" onclick="window.print()">
            <i class="fas fa-print me-1"></i> Imprimir (navegador)
        </button>
    </div>
</div>

<div id="contenido" class="text-center text-muted py-5">
    <div class="spinner-border text-primary" role="status"></div>
    <div class="mt-2">Cargando...</div>
</div>

<script>
const REMITO_ID = {{ remito_id }};

function fmt(n) {
    return '$' + Number(n || 0).toLocaleString('es-AR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function cargar() {
    fetch(`/remitos/api/cargar/${REMITO_ID}`)
        .then(r => r.json())
        .then(data => {
            if (data.error) {
                document.getElementById('contenido').innerHTML = `<div class="alert alert-danger">${data.error}</div>`;
                return;
            }
            const c = data.cabecera;
            const badge = c.estado === 'pendiente' ? 'bg-warning text-dark' :
                          c.estado === 'facturado' ? 'bg-success' : 'bg-secondary';

            let html = `
                <div class="card mb-3">
                    <div class="card-header bg-light fw-bold d-flex justify-content-between align-items-center">
                        <span><i class="fas fa-file me-2"></i>${c.numero_completo}</span>
                        <span class="badge ${badge} fs-6">${c.estado}</span>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <p class="mb-1"><strong>Cliente:</strong> ${c.cliente_nombre}</p>
                                <p class="mb-1"><strong>CUIT:</strong> ${c.cuit || '-'}</p>
                                <p class="mb-1"><strong>Dirección:</strong> ${c.direccion || '-'}</p>
                                <p class="mb-1"><strong>Cond. IVA:</strong> ${c.condicion_iva || '-'}</p>
                                <p class="mb-1"><strong>Zona de reparto:</strong> ${c.zona_nombre ? `<span class="badge" style="background:${c.zona_color || '#0d6efd'}">${c.zona_nombre}</span>` : '<span class="text-muted">-</span>'}</p>
                            </div>
                            <div class="col-md-6">
                                <p class="mb-1"><strong>Fecha:</strong> ${c.fecha}</p>
                                ${c.observaciones ? `<p class="mb-1"><strong>Observaciones:</strong> ${c.observaciones}</p>` : ''}
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card mb-3">
                    <div class="card-header bg-light fw-bold"><i class="fas fa-list me-2"></i>Detalle</div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-sm mb-0">
                                <thead class="table-dark">
                                    <tr>
                                        <th>Código</th>
                                        <th>Producto</th>
                                        <th class="text-end">Cantidad</th>
                                        <th class="text-end">P. Unit. c/IVA</th>
                                        <th class="text-end">Subtotal</th>
                                    </tr>
                                </thead>
                                <tbody>
            `;

            let sumaCant = 0;
            data.items.forEach(i => {
                sumaCant += i.cantidad;
                html += `
                    <tr>
                        <td><code>${i.codigo}</code></td>
                        <td>${i.nombre}</td>
                        <td class="text-end">${i.cantidad.toFixed(3)}</td>
                        <td class="text-end">${fmt(i.precio_unitario)}</td>
                        <td class="text-end fw-bold">${fmt(i.subtotal)}</td>
                    </tr>
                `;
            });

            html += `
                                </tbody>
                                <tfoot class="table-light fw-bold">
                                    <tr>
                                        <td colspan="2">${data.items.length} artículo(s)</td>
                                        <td class="text-end">${sumaCant.toFixed(3)}</td>
                                        <td class="text-end">TOTAL:</td>
                                        <td class="text-end text-primary fs-5">${fmt(c.total)}</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                </div>
            `;

            // Bloque de LIQUIDACIÓN si existe
            if (data.liquidacion) {
                const liq = data.liquidacion;
                const det = liq.detalle || {};
                html += `
                    <div class="card mb-3 border-info">
                        <div class="card-header bg-info text-dark fw-bold">
                            <i class="fas fa-balance-scale me-2"></i>
                            Liquidación del remito
                            <span class="float-end small fw-normal">
                                ${liq.fecha} ${liq.usuario ? '— por ' + liq.usuario : ''}
                            </span>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-sm mb-0">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Producto</th>
                                            <th class="text-end">Original</th>
                                            <th class="text-end text-success">Entregada</th>
                                            <th class="text-end text-warning">Devuelta</th>
                                            <th class="text-end text-danger">Rotura</th>
                                            <th>Motivo</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                `;
                let totEnt = 0, totDev = 0, totRot = 0;
                data.items.forEach(i => {
                    const d = det[i.remito_detalle_id];
                    if (!d) return;
                    totEnt += d.cant_entregada;
                    totDev += d.cant_devuelta;
                    totRot += d.cant_rotura;
                    html += `
                        <tr>
                            <td><code>${i.codigo}</code> ${i.nombre}</td>
                            <td class="text-end">${d.cant_original.toFixed(3)}</td>
                            <td class="text-end text-success fw-bold">${d.cant_entregada.toFixed(3)}</td>
                            <td class="text-end ${d.cant_devuelta > 0 ? 'text-warning fw-bold' : 'text-muted'}">${d.cant_devuelta.toFixed(3)}</td>
                            <td class="text-end ${d.cant_rotura > 0 ? 'text-danger fw-bold' : 'text-muted'}">${d.cant_rotura.toFixed(3)}</td>
                            <td><small>${d.motivo || '<span class="text-muted">-</span>'}</small></td>
                        </tr>
                    `;
                });
                html += `
                                    </tbody>
                                    <tfoot class="table-light fw-bold">
                                        <tr>
                                            <td colspan="2" class="text-end">TOTALES:</td>
                                            <td class="text-end text-success">${totEnt.toFixed(3)}</td>
                                            <td class="text-end text-warning">${totDev.toFixed(3)}</td>
                                            <td class="text-end text-danger">${totRot.toFixed(3)}</td>
                                            <td></td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>
                            ${liq.observaciones ? `<div class="p-3 border-top small"><strong>Observaciones:</strong> ${liq.observaciones}</div>` : ''}
                        </div>
                    </div>
                `;
            }

            html += `
                <div class="alert alert-secondary small d-print-none">
                    <i class="fas fa-info-circle me-1"></i>
                    Los precios mostrados son los del momento de emisión del remito (referencia histórica). Si este remito todavía no fue facturado, los precios de la factura serán los vigentes al momento de facturar.
                </div>
            `;

            document.getElementById('contenido').innerHTML = html;
        })
        .catch(err => {
            document.getElementById('contenido').innerHTML =
                `<div class="alert alert-danger">Error al cargar: ${err}</div>`;
        });
}

cargar();

function imprimirTermica() {
    Swal.fire({
        title: '¿Imprimir en la impresora térmica?',
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#198754',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'Sí, imprimir',
        cancelButtonText: 'Cancelar'
    }).then(result => {
        if (!result.isConfirmed) return;
        fetch(`/remitos/imprimir/${REMITO_ID}`, {method: 'POST'})
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Remito impreso',
                        text: data.mensaje || '',
                        timer: 1800, showConfirmButton: false, timerProgressBar: true
                    });
                } else {
                    Swal.fire('Error', data.error || 'Error desconocido', 'error');
                }
            })
            .catch(err => Swal.fire('Error de red', String(err), 'error'));
    });
}
</script>

<style>
@media print {
    .d-print-none { display: none !important; }
    body { font-size: 12px; }
}
</style>
{% endblock %}
